name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14' # Specify your Node.js version

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test # Adjust this to your testing command

      - name: Build the application
        run: npm run build # Adjust this to your build command

      - name: Deploy (optional)
        run: |
          echo "Deploying to your environment" # Add your deployment commands here
